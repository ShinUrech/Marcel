# Production compose — DigitalOcean Droplet
# Uses MongoDB Atlas (MONGO_URI in .env), no local mongo or frontend.
# Frontend is deployed separately on Vercel.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  # ─── Backend (NestJS) ─────────────────────────────────────
  backend:
    build:
      context: ./project-marcel-be
      dockerfile: Dockerfile
    container_name: marcel-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      APP_NAME: BE_CORE
      MONGO_URI: ${MONGO_URI}
      CHATGPT_API_KEY: ${CHATGPT_API_KEY}
      LINKEDIN_EMAIL: ${LINKEDIN_EMAIL:-}
      LINKEDIN_PASSWORD: ${LINKEDIN_PASSWORD:-}
      LINKEDIN_LI_AT: ${LINKEDIN_LI_AT:-}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    volumes:
      - backend-public:/app/public
      - ./puppeteer_data:/app/puppeteer_data
    networks:
      - marcel-network

  # ─── Cron Scraper ─────────────────────────────────────────
  scraper-cron:
    image: curlimages/curl:latest
    container_name: marcel-scraper-cron
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Scraper cron started. Daily 03:00 + weekly Sunday 06:00"
        while true; do
          HOUR=$$(date +%H)
          MINUTE=$$(date +%M)
          DAY=$$(date +%u)
          if [ "$$HOUR" = "03" ] && [ "$$MINUTE" = "00" ]; then
            echo "[CRON] $$(date) - Starting daily scrape..."
            curl -s -o /dev/null -w "HTTP %{http_code}" http://backend:5000/api/scraper/scrape-all || true
            sleep 120
            curl -s -o /dev/null -w "HTTP %{http_code}" http://backend:5000/api/content-generator/image-title || true
            sleep 60
            curl -s -o /dev/null -w "HTTP %{http_code}" http://backend:5000/api/content-generator/better-images || true
            sleep 120
          fi
          if [ "$$DAY" = "7" ] && [ "$$HOUR" = "06" ] && [ "$$MINUTE" = "00" ]; then
            echo "[CRON] $$(date) - Starting weekly content generation..."
            curl -s -o /dev/null -w "HTTP %{http_code}" http://backend:5000/api/content-generator/content || true
            curl -s -o /dev/null -w "HTTP %{http_code}" http://backend:5000/api/content-generator/teaser || true
            curl -s -o /dev/null -w "HTTP %{http_code}" http://backend:5000/api/content-generator/better-images || true
            sleep 120
          fi
          sleep 60
        done
    depends_on:
      - backend
    networks:
      - marcel-network

volumes:
  backend-public:

networks:
  marcel-network:
    driver: bridge
